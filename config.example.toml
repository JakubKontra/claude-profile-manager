# Claude Code Multi-Account Profile Configuration
# Copy to ~/.claude-profiles/config.toml and edit
#
# Profile names become CLI commands: claude-<name>

# Source directory for shared configuration (default: ~/.claude)
source_dir = "~/.claude"

# Where to install wrapper scripts (default: ~/.local/bin)
bin_dir = "~/.local/bin"

[profiles.personal]
description = "Personal Anthropic account"

[profiles.work]
description = "Company team subscription"
model = "sonnet"
add_dirs = ["~/Work/company"]

